name: Build Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker build -t quotes-app .
      
      - name: Test container
        run: |
          docker run -d -p 5000:5000 --name test quotes-app
          sleep 5
          curl --fail http://localhost:5000 || (echo "Container failed" && exit 1)
          docker stop test
